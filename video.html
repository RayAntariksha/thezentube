<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watch Video - ZenTube</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="video.css.css">
    <style>
        
    </style>
</head>

<body>
    <a href="index.html" class="back-link">&larr; Back to list</a>
    <div class="player-wrapper">
        <iframe id="videoPlayer" src="" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; fullscreen" allowfullscreen></iframe>
    </div>
    <div class="title-bar" id="videoTitle"></div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');
        const title = params.get('title');
        if (id) {
            document.getElementById('videoPlayer').src = `https://www.youtube-nocookie.com/embed/${id}?rel=0&autoplay=1`;
        }
        if (title) {
            document.getElementById('videoTitle').textContent = decodeURIComponent(title);
        }
    </script>
</body>

</html>
