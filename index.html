<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e3a8a">
    <link rel="icon" href="assets/icon.svg" type="image/png">
    <title>ZenTube</title>
    <style>

    </style>
</head>

<body>
    <script>
        if ("serviceWorker" in navigator) {
            window.addEventListener("load", () => {
                navigator.serviceWorker.register("/service-worker.js")
                    .then(() => console.log("Service Worker Registered"));
            });
        }
    </script>
    <div class="wallpaper-wrapper"></div>

    <div class="header">
        <a href="/index.html" style="text-decoration: none;">
            <div class="logo-wrapper">

                <img src="/assets/icon.svg" alt="" id="logo">
                <h1 style="text-decoration: none;">ZenTube</h1>
            </div>
        </a>
        <div class="welcome">
            <h1>Welcome to ZenTube</h1>
            <p>A collection of 500+ educational videos meant for removing distractions from your study sessions.</p>
            <input type="text" id="searchBar" placeholder="Search through 3000+ videos..." oninput="handleSearch()">
        </div>
    </div>
    <div class="video-grid" id="videoGrid"></div>

    <script>
        let allVideos = [];

        // 1. Load the data
        async function init() {
            try {
                const response = await fetch('Database.txt');
                const text = await response.text();

                allVideos = text.split('\n')
                    .filter(line => line.includes('|'))
                    .map(line => {
                        const [id, ...titleParts] = line.split('|');
                        return { id: id.trim(), title: titleParts.join('|').trim() };
                    });

                // Show 12 random videos to start
                showVideos(shuffle([...allVideos]).slice(0, 12));
            } catch (e) {
                document.getElementById('videoGrid').innerHTML = "Error loading videos.txt";
            }
        }

        function shuffle(array) {
            return array.sort(() => Math.random() - 0.5);
        }

        // 2. Render Videos
        function showVideos(videos) {
            const grid = document.getElementById('videoGrid');
            grid.innerHTML = videos.map(v => `
            <div class="video-card" onclick="openVideo('${v.id}', '${encodeURIComponent(v.title)}')">
                <div class="thumbnail-container">
                    <img src="https://img.youtube.com/vi/${v.id}/mqdefault.jpg" alt="thumbnail">
                    <div class="play-btn"></div>
                    </div>
                    <div class="video-info">
                        <div class="video-title">${v.title}</div>
                        </div>
                        </div>
                        `).join('');
        }

        // 3. Search Logic
        function handleSearch() {
            const query = document.getElementById('searchBar').value.trim().toLowerCase();
            // when there is no meaningful query show a fresh random set
            if (query.length < 2) {
                showVideos(shuffle([...allVideos]).slice(0, 12));
                return;
            }

            // break the query into individual words and match against the title
            const terms = query.split(/\s+/).filter(Boolean);
            const filtered = allVideos.filter(v => {
                const title = v.title.toLowerCase();
                // require that every term appears somewhere in the title
                return terms.every(term => title.includes(term) || v.id.includes(term));
            });

            showVideos(filtered);
        }

        // redirected player page
        function openVideo(id, titleEncoded) {
            // navigate to a dedicated video page with query params
            window.location.href = `video.html?id=${id}&title=${titleEncoded}`;
        }

        // (legacy) lazy-load iframe if we ever need inline playback
        function loadVideo(card, id) {
            const container = card.querySelector('.thumbnail-container');
            container.innerHTML = `
            <iframe src="https://www.youtube-nocookie.com/embed/${id}?autoplay=1" 
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; fullscreen" 
            allowfullscreen></iframe>`;
        }

        init();
    </script>
    <hr>
    <footer>
        <p>Copyright &copy; 2026 Antariksha Ray</p>
    </footer>
</body>

</html>
